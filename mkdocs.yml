site_name: Windows On-Prem Einstiegstraining
site_description: Selbstgeführtes Windows-Server-Training für IT-Profis – Serverlandschaft von Grund auf aufbauen
site_url: https://igerla.github.io/WindowsOnPremTraining
repo_url: https://github.com/IGerla/WindowsOnPremTraining
repo_name: IGerla/WindowsOnPremTraining
docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  features:
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

