site_name: Windows On-Prem Einstiegstraining
site_description: Selbstgeführtes Windows-Server-Training für IT-Profis – Serverlandschaft von Grund auf aufbauen
site_url: https://igerla.github.io/WindowsOnPremTraining
repo_url: https://github.com/IGerla/WindowsOnPremTraining
repo_name: IGerla/WindowsOnPremTraining
docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  features:
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Willkommen: index.md
  - Trainingsplan: roadmap.md
  - Trainer-Setup: trainer-setup.md
  - Lernpfad 1 – Grundlagen:
    - Modul 0 – Orientierung: modul-0-orientierung.md
    - Modul 1 – Erste VM: modul-1-vm.md
    - Modul 2 – Grundkonfiguration: modul-2-grundconfig.md
    - Modul 3 – Active Directory: modul-3-activedirectory.md
    - Modul 4 – Benutzer & Gruppen: modul-4-benutzer.md
    - Modul 5 – DNS: modul-5-dns.md
    - Modul 6 – DHCP: modul-6-dhcp.md
    - Modul 7 – Aufräumen: modul-7-aufräumen.md
  - Lernpfad 2 – Netzwerk & Infrastruktur:
    - Modul 8 – Netzwerk-Design: modul-8-netzwerk.md
    - Modul 9 – Routing: modul-9-routing.md
    - Modul 10 – Windows-Firewall: modul-10-firewall.md
    - Modul 11 – Webserver IIS: modul-11-iis.md
    - Modul 12 – NPS & RADIUS: modul-12-nps.md
    - Modul 13 – VPN: modul-13-vpn.md
    - Modul 14 – Aufräumen: modul-14-aufräumen.md
  - Lernpfad 3 – Fileserver & Drucken:
    - Modul 15 – Dateifreigaben: modul-15-freigaben.md
    - Modul 16 – NTFS-Berechtigungen: modul-16-ntfs.md
    - Modul 17 – DFS: modul-17-dfs.md
    - Modul 18 – Quotas & FSRM: modul-18-fsrm.md
    - Modul 19 – Druckserver: modul-19-druckserver.md
    - Modul 20 – Aufräumen: modul-20-aufräumen.md
